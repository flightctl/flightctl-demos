apiVersion: v1alpha1
kind: Fleet
metadata:
  name: basic-nginx-fleet
spec:
  selector:
    matchLabels:
      fleet: basic-nginx-fleet
  template:
    spec:
      os:
        image: quay.io/flightctl/flightctl-agent-basic-nginx:latest
      config:
        - name: microshift-manifests
          configType: GitConfigProviderSpec
          gitRef:  
            repository: basic-nginx-demo
            targetRevision: main
            path: /basic-nginx-demo/configuration
        - name: ricky-super-secrets
          configType: GitConfigProviderSpec
          gitRef:  
            repository: ricky-super-secrets
            targetRevision: main
            path: /configuration
      systemd:
        matchPatterns:
          - "microshift.service"
          - "crio.service"
          - "flightctl-agent.service"
      containers:
        matchPatterns:
          - "*nginx*"
