name: Build & publish bootc image

on:
  workflow_dispatch:
    inputs:
      demo:
        description: 'Name of the demo and image to build.'
        type: string
        required: true
      tags:
        description: '(Optional) Extra tags for the image (comma-separated).'
        type: string
        required: false
      oci-registry:
        description: 'OCI registry to push image to.'
        type: string
        required: true
        default: 'quay.io'
      oci-org:
        description: 'OCI organisation to push image to.'
        type: string
        required: true
        default: 'flightctl-demos'
      agent-config:
        description: '(Optional) Base64-encoded agent config.'
        type: string
        required: false
      agent-version:
        description: '(Optional) flightctl-agent version to install.'
        type: string
        required: false
      dry_run:
        description: 'Build only without pushing to registry (for testing).'
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      demo:
        description: 'Name of the demo and image to build.'
        type: string
        required: true
      tags:
        description: '(Optional) Extra tags for the image (comma-separated).'
        type: string
        required: false
      oci-registry:
        description: 'OCI registry to push image to.'
        type: string
        required: true
        default: 'quay.io'
      oci-org:
        description: 'OCI organisation to push image to.'
        type: string
        required: true
        default: 'flightctl-demos'
      agent-config:
        description: '(Optional) Base64-encoded agent config.'
        type: string
        required: false
      agent-version:
        description: '(Optional) flightctl-agent version to install.'
        type: string
        required: false
      dry_run:
        description: 'Build only without pushing to registry (for testing).'
        type: boolean
        required: false
        default: false
    secrets:
      OCI_REGISTRY_USERNAME:
        required: true
      OCI_REGISTRY_PASSWORD:
        required: true
      SIGNING_KEY_PRIVATE:
        required: true
      AGENT_CONFIG:
        required: false

jobs:
  preflight:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Verify at least one Containerfile exists
        run: |
          DEMO_DIR=$([ -d "base/${{ inputs.demo }}" ] && echo "base/${{ inputs.demo }}" || echo "demos/${{ inputs.demo }}")
          for arch in amd64 arm64; do
            if [ -f "${DEMO_DIR}/bootc/Containerfile.${arch}" ] || [ -f "${DEMO_DIR}/bootc/Containerfile" ]; then
              echo "Found Containerfile for ${arch}"
              exit 0
            fi
          done
          echo "Error: No Containerfile found for any architecture in ${DEMO_DIR}/bootc/"
          exit 1

  build-bootc-images:
    needs: [preflight]

    strategy:
      matrix:
        runner: ["ubuntu-24.04","ubuntu-24.04-arm"]
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    container:
      image: registry.access.redhat.com/ubi9/ubi
      options: --privileged

    env:
      ARCH: ${{ (matrix.runner == 'ubuntu-24.04-arm') && 'arm64' || 'amd64' }}
      AGENT_CONFIG: ${{ (inputs.agent-config != '') && inputs.agent-config || secrets.AGENT_CONFIG }}

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Check if Containerfile exists for this architecture
        id: check-containerfile
        run: |
          DEMO_DIR=$([ -d "base/${{ inputs.demo }}" ] && echo "base/${{ inputs.demo }}" || echo "demos/${{ inputs.demo }}")
          if [ -f "${DEMO_DIR}/bootc/Containerfile.${{ env.ARCH }}" ] || [ -f "${DEMO_DIR}/bootc/Containerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "No Containerfile found for ${{ env.ARCH }}, skipping build"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Podman 5 and configure it to attach Sigstore signatures
        if: steps.check-containerfile.outputs.exists == 'true'
        run: |
          dnf -y install podman
          tee "/etc/containers/registries.d/${{ inputs.oci-registry }}.yaml" > /dev/null <<EOF
            docker:
              ${{ inputs.oci-registry }}:
                use-sigstore-attachments: true
          EOF

      - name: Log in to OCI registry
        if: steps.check-containerfile.outputs.exists == 'true'
        run: podman login -u '${{ secrets.OCI_REGISTRY_USERNAME }}' -p '${{ secrets.OCI_REGISTRY_PASSWORD }}' ${{ inputs.oci-registry }}

      - name: Set env vars
        if: steps.check-containerfile.outputs.exists == 'true'
        run: |
          echo "OCI_IMAGE=${{ inputs.oci-registry }}/${{ inputs.oci-org }}/${{ inputs.demo }}" >> $GITHUB_ENV
          echo "OCI_IMAGE_TAG=${GITHUB_SHA::8}-${{ env.ARCH }}" >> $GITHUB_ENV

      - name: Build bootc image
        if: steps.check-containerfile.outputs.exists == 'true'
        run: |
          DEMO_DIR=$([ -d "base/${{ inputs.demo }}" ] && echo "base/${{ inputs.demo }}" || echo "demos/${{ inputs.demo }}")
          pushd ${DEMO_DIR}/bootc
          # Determine which Containerfile to use (existence already verified)
          if [ -f "Containerfile.${{ env.ARCH }}" ]; then
            CONTAINERFILE="Containerfile.${{ env.ARCH }}"
          else
            CONTAINERFILE="Containerfile"
          fi
          if [ -n "${AGENT_CONFIG}" ]; then
            echo "${AGENT_CONFIG}" | base64 -d > config.yaml
            echo -e "\nADD config.yaml /etc/flightctl/\n" >> ${CONTAINERFILE}
          fi
          BUILD_ARGS=""
          if [ -n "${{ inputs.agent-version }}" ]; then
            BUILD_ARGS="--build-arg FLIGHTCTL_VERSION=${{ inputs.agent-version }}"
          fi
          podman build ${BUILD_ARGS} -t ${OCI_IMAGE}:${OCI_IMAGE_TAG} -f ${CONTAINERFILE} .
          popd

      - name: Lint bootc image
        if: steps.check-containerfile.outputs.exists == 'true'
        run: podman run --rm ${OCI_IMAGE}:${OCI_IMAGE_TAG} bootc container lint --fatal-warnings --skip var-tmpfiles

      - name: Push image to registry and sign it
        if: steps.check-containerfile.outputs.exists == 'true' && ! inputs.dry_run
        run: |
          printf '%s' '${{ secrets.SIGNING_KEY_PRIVATE }}' > ./signingkey.private
          podman push --sign-by-sigstore-private-key ./signingkey.private ${OCI_IMAGE}:${OCI_IMAGE_TAG}


  build-bootc-manifestlist:
    needs: [build-bootc-images]

    if: ${{ ! inputs.dry_run }}

    runs-on: ubuntu-24.04

    container:
      image: registry.access.redhat.com/ubi9/ubi
      options: --privileged

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Read tags from Containerfile.tags
        id: read-tags
        run: |
          DEMO_DIR=$([ -d "base/${{ inputs.demo }}" ] && echo "base/${{ inputs.demo }}" || echo "demos/${{ inputs.demo }}")
          TAGS_FILE="${DEMO_DIR}/bootc/Containerfile.tags"
          FILE_TAGS=""
          if [ -f "$TAGS_FILE" ]; then
            FILE_TAGS=$(cat "$TAGS_FILE" | tr '\n' ',' | sed 's/,$//')
          fi
          if [ -n "${{ inputs.tags }}" ] && [ -n "$FILE_TAGS" ]; then
            ALL_TAGS="${{ inputs.tags }},${FILE_TAGS}"
          elif [ -n "${{ inputs.tags }}" ]; then
            ALL_TAGS="${{ inputs.tags }}"
          else
            ALL_TAGS="${FILE_TAGS}"
          fi
          echo "all_tags=${ALL_TAGS}" >> $GITHUB_OUTPUT

      - name: Install container tools and configure them to attach Sigstore signatures
        run: |
          dnf -y install podman
          tee "/etc/containers/registries.d/${{ inputs.oci-registry }}.yaml" > /dev/null <<EOF
            docker:
              ${{ inputs.oci-registry }}:
                use-sigstore-attachments: true
          EOF

      - name: Log in to OCI registry
        run: podman login -u '${{ secrets.OCI_REGISTRY_USERNAME }}' -p '${{ secrets.OCI_REGISTRY_PASSWORD }}' ${{ inputs.oci-registry }}

      - name: Set env vars
        run: |
          echo "OCI_IMAGE=${{ inputs.oci-registry }}/${{ inputs.oci-org }}/${{ inputs.demo }}" >> $GITHUB_ENV
          echo "OCI_IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Detect available architectures
        id: detect-archs
        run: |
          DEMO_DIR=$([ -d "base/${{ inputs.demo }}" ] && echo "base/${{ inputs.demo }}" || echo "demos/${{ inputs.demo }}")
          ARCHS=""
          for arch in amd64 arm64; do
            if [ -f "${DEMO_DIR}/bootc/Containerfile.${arch}" ] || [ -f "${DEMO_DIR}/bootc/Containerfile" ]; then
              ARCHS="${ARCHS} ${arch}"
            fi
          done
          ARCHS=$(echo "${ARCHS}" | xargs)
          if [ -z "${ARCHS}" ]; then
            echo "Error: No Containerfiles found for any architecture"
            exit 1
          fi
          echo "archs=${ARCHS}" >> $GITHUB_OUTPUT
          echo "Architectures to include in manifest: ${ARCHS}"

      - name: Create manifest list
        run: |
          podman manifest create ${OCI_IMAGE}:${OCI_IMAGE_TAG}
          for arch in ${{ steps.detect-archs.outputs.archs }}; do
            podman manifest add ${OCI_IMAGE}:${OCI_IMAGE_TAG} docker://${OCI_IMAGE}:${OCI_IMAGE_TAG}-${arch}
          done

      - name: Push manifest list to registry and sign it
        run: |
          printf '%s' '${{ secrets.SIGNING_KEY_PRIVATE }}' > ./signingkey.private
          podman manifest push --all \
            --sign-by-sigstore-private-key ./signingkey.private \
            ${OCI_IMAGE}:${OCI_IMAGE_TAG} \
            docker://${OCI_IMAGE}:${OCI_IMAGE_TAG}

      - name: Tag manifest list with extra tags, push and sign them
        if: ${{ steps.read-tags.outputs.all_tags != '' }}
        run: |
          printf '%s' '${{ secrets.SIGNING_KEY_PRIVATE }}' > ./signingkey.private
          IFS=',' read -r -a tags <<< "${{ steps.read-tags.outputs.all_tags }}"
          for tag in "${tags[@]}"; do
            tag=$(echo "${tag}" | tr -d '[:space:]')
            podman tag ${OCI_IMAGE}:${OCI_IMAGE_TAG} ${OCI_IMAGE}:${tag}
            podman manifest push --all \
              --sign-by-sigstore-private-key ./signingkey.private \
              ${OCI_IMAGE}:${tag} \
              docker://${OCI_IMAGE}:${tag}
          done
